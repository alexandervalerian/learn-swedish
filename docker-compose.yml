services:
  traefik:
    image: traefik:v3
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  swedish:
    image: swedish-app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.swedish.rule=PathPrefix(`/`)"
      - "traefik.http.routers.swedish.entrypoints=web"
      - "traefik.http.services.swedish.loadbalancer.server.port=3000"
